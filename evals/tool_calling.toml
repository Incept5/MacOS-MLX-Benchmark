# Tool Calling Evaluation Suite
# Tests whether models can correctly invoke tools with proper parameters.
# Scenarios are grouped by complexity: single-tool, multi-choice, parameter-extraction, multi-step.
#
# Each scenario defines:
#   - tools: list of available tool definitions (OpenAI function calling format)
#   - user_message: the user's request
#   - expected_calls: list of expected tool calls [{function, args}]
#
# Scoring:
#   - function_accuracy: did the model pick the right function?
#   - param_accuracy: did it extract the correct parameters?
#   - json_valid: was the output parseable as a tool call?

# ============================================================
# SINGLE TOOL — only one tool available, test parameter extraction
# ============================================================

[[scenario]]
id = "weather-simple"
category = "single-tool"
user_message = "What's the weather like in Tokyo right now?"

[[scenario.tools]]
name = "get_weather"
description = "Get the current weather for a location"
parameters = { type = "object", properties = { location = { type = "string", description = "City name" }, unit = { type = "string", enum = ["celsius", "fahrenheit"], description = "Temperature unit" } }, required = ["location"] }

[[scenario.expected_calls]]
function = "get_weather"
args = { location = "Tokyo" }

